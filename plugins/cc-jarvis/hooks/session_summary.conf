# 세션 요약 hook (Claude Code Stop 이벤트) 설정
# 기존 conf 가 이미 있으면 install.sh 가 덮어쓰지 않습니다.
# 이 파일에서 누락된 키는 session_summary.sh 가 기본값으로 자동 보완합니다.

# ON/OFF 토글
ENABLED=true

# macOS say 음성. `say -v "?" | grep ko_KR` 로 사용 가능 음성 확인
VOICE="Yuna"

# 읽기 속도 (단어/분). 빈 값이면 시스템 기본 (~175). 한국어 음성은 200~230 권장
RATE=""

# 요약 모델. 속도/비용을 위해 Haiku 4.5 기본
MODEL="claude-haiku-4-5"

# 음성으로 읽을 텍스트 최대 길이 (바이트 기준 head -c). 약 600자 = 25~30초
SUMMARY_MAX_CHARS=600

# 데스크톱 알림에 노출할 텍스트 최대 길이 (macOS 알림은 ~256자에서 잘림)
NOTIFY_MAX_CHARS=240

# 알림 타이틀
NOTIFY_TITLE="🤖 Claude 작업 완료"
